default_action = "passthrough"
bash_unwrap_patterns = ["/^\\w+=(?:\\\"(?:\\\\.|[^\\\"])*\\\"|'(?:\\\\.|[^'])*'|\\S+)\\s+(.+)$/", "mise x * -- *", "/^timeout \\d\\S* (.+)$/"]

[[rules]]
tool = "PowerShell"
action = "deny"
reason = "가능한 bash를 사용하고 정말 Powershell이 필요하다면 턴을 종료하고 명시적으로 요청해주세요"
[rules.match]
command = "/.*/"

[[rules]]
tools = ["Bash", "Monitor"]
[rules.match]
patterns = [
  "/^\\w+=\\S*\\s+(.+)$/",
  "/^agent-slack message (list|get|draft)( .*)?$/",
  ":",
  "awk *",
  "cat *",
  "cd *",
  "chmod *",
  "claude --version",
  "codex *",
  "comm *",
  "cp *",
  "/^curl(?!.*\\s-[A-Za-z]*[dFTX])(?!.*\\s--(?:data|form|upload|json|request)) .+$/",
  "dart *",
  "date *",
  "/^deno (check|fmt|test|lint|task|run|eval|info)( .*)?$/",
  "diff *",
  "dotnet *",
  "echo *",
  "env",
  "fd *",
  "fig *",
  "find *",
  "flutter *",
  "/^gh .*?(issue|pr|run|release|repo) (view|list|watch)( .*)?$/",
  "/^gh search (issues|prs|commits)( .*)?$/",
  "/^gh api repos\\/[^\\s\\/]+\\/[^\\s\\/]+\\/(issues(\\/[0-9]+(\\/comments)?)?|pulls\\/[0-9]+\\/(comments|reviews)|readme)(\\s+--jq\\s+.*)?(\\s+-X\\s+GET.*)?$/",
  "/^gh auth (status|switch).*$/",
  "gh pr create --web *",
  "gh pr ready *",
  "/^gh repo create (?=.*--private( |$)).+$/",
  "/^(git|yadm) (?!-C )(?!reset( .*)? (--hard|[\"']--hard[\"']|\\\\--hard)( |$))(?!push( |$))(?!stash drop( |$))(?!clean( |$)).+$/",
  "/^(git|yadm) -C (?:\\\\ |\\S)+ (?!reset( .*)? (--hard|[\"']--hard[\"']|\\\\--hard)( |$))(?!push( |$))(?!stash drop( |$))(?!clean( |$)).+$/",
  "/^yadm (?!-C )push((?! --force| -f($| )).)*$/",
  "grep *",
  "head *",
  "jq *",
  "ls *",
  "mise *",
  "mkdir *",
  "mktemp *",
  "msbuild *",
  "netstat *",
  "nvim *",
  "/^(npx?|p?npm|yarn)( .*)?$/",
  "base64 *",
  "basename *",
  "openssl rand *",
  "pwd",
  "qmd *",
  "permcheck *",
  "playwright-cli *",
  "reg query *",
  "prettier *",
  "prettierd *",
  "printf *",
  "rg *",
  "sd *",
  "sed *",
  "seq *",
  "sleep *",
  "sort *",
  "tail *",
  "/^tasklist( .*)?$/",
  "terminal-notifier *",
  "timeout *",
  "tree *",
  "true",
  "uniq *",
  "/^unzip -(l|p) .+$/",
  "wc *",
  "/^wmic .*\\bget\\b.*$/",
  "xxd *",
  "./gradlew *",
]

[[rules]]
tools = ["Bash", "Monitor"]
[rules.match]
parse_error = true

[[rules]]
tools = ["Bash", "Monitor"]
action = "deny"
[rules.match]
patterns = [
  "find / *",
  "rm -rf /*",
]

[[rules]]
tools = ["Bash", "Monitor"]
action = "deny"
reason = "임시 코드 실행은 python 대신 deno eval/run 사용"
[rules.match]
patterns = ["python3 *", "python *"]

[[rules]]
tool = "Read"
[rules.match]
file_path = "/tmp/**"

[[rules]]
tools = ["Grep", "Glob"]
[rules.match]
path = "/^(?!(?:[A-Za-z]:)?[\\\\/]*$).+$/"

[[rules]]
tool = "Skill"
[rules.match]
skill = "/^(zettelkasten|codex|commit-flavor|draft-pr|gemini-query|get-pr-changes|list-issue-comments|list-pr-comments)$/"

[[rules]]
tool = "SlashCommand"
[rules.match]
command = "/draft-pr"

[[rules]]
tool = "WebFetch"
[rules.match]
domain = "/^(apple\\.github\\.io|developers\\.google\\.com|developers\\.openai\\.com|discourse\\.nixos\\.org|docs\\.anthropic\\.com|docs\\.codemagic\\.io|docs\\.deno\\.com|docs\\.sentry\\.io|every\\.to|fnox\\.jdx\\.dev|github\\.com|jsr\\.io|mise\\.jdx\\.dev|panda-css\\.com|podcasters\\.apple\\.com|pub\\.dev|raw\\.githubusercontent\\.com|www\\.npmjs\\.com)$/"

[[rules]]
tool = "WebSearch"
[rules.match]
query = "*"

